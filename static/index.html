<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ph3b3-Light</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="manifest" href="/static/site.webmanifest">
    <meta name="theme-color" content="#A855F7">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            color: #e2d9f3;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #topbar {
            background: #0c0c1e;
            padding: 0 16px;
            height: 42px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #7c3aed;
            flex-shrink: 0;
        }

        #status-dot  { font-size: 14px; color: #3d3660; transition: color 0.2s; }
        #status-text { font-size: 13px; color: #5b5280; transition: color 0.2s; }
        #title       { margin-left: auto; color: #a855f7; font-size: 13px; letter-spacing: 2px; }

        #chat {
            flex: 1;
            background: #0d0d1c;
            overflow-y: auto;
            padding: 16px 20px;
        }

        #chat::-webkit-scrollbar       { width: 6px; }
        #chat::-webkit-scrollbar-track { background: #0d0d1c; }
        #chat::-webkit-scrollbar-thumb { background: #2a1f4a; border-radius: 3px; }

        .msg-ts        { color: #3d3660; font-size: 11px; }
        .msg-name-user { color: #a78bfa; font-weight: bold; font-size: 13px; }
        .msg-name-bot  { color: #c084fc; font-weight: bold; font-size: 13px; }
        .msg-text-user { color: #a78bfa; font-size: 13px; white-space: pre-wrap; margin-bottom: 8px; }
        .msg-text-bot  { color: #c084fc; font-size: 13px; white-space: pre-wrap; margin-bottom: 8px; }
        .msg-sys       { color: #5b5280; font-size: 12px; font-style: italic; padding: 4px 0; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .thinking { color: #5b5280; font-size: 12px; font-style: italic;
                    animation: pulse 1.2s ease-in-out infinite; padding: 4px 0; }

        #sep { height: 1px; background: #2a1f4a; flex-shrink: 0; }

        /* ── Input bar ──────────────────────────────────────────────────────── */
        #inputbar {
            background: #0f0f22;
            padding: 12px 14px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #input-wrap {
            background: #13132c;
            border: 2px solid #2a1f4a;
            border-radius: 4px;
            transition: border-color 0.15s;
        }

        #input-wrap:focus-within { border-color: #a855f7; }

        #msg-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #e2d9f3;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            padding: 12px 10px;
            caret-color: #a855f7;
        }

        #ctrl-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 10px;
        }

        #send-btn {
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 9px 22px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        #send-btn:hover:not(:disabled) { background: #a855f7; }
        #send-btn:disabled { background: #2a1f4a; color: #5b5280; cursor: not-allowed; }

        #mode-box { display: flex; gap: 3px; }

        #btn-auto, #btn-hold {
            background: #18182e;
            color: #5b5280;
            border: none;
            border-radius: 4px;
            padding: 9px 18px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        /* ── Mic column ─────────────────────────────────────────────────────── */
        #right-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        #mic-canvas { cursor: pointer; display: block; user-select: none; }

        #mic-label {
            color: #5b5280;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            margin-top: 6px;
            text-align: center;
        }

        /* ── Login overlay ──────────────────────────────────────────────── */
        #login-overlay {
            position: fixed; inset: 0;
            background: rgba(10, 10, 20, 0.97);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9000;
        }
        #login-overlay.visible { display: flex; }
        #login-box {
            background: #13132c;
            border: 2px solid #7c3aed;
            border-radius: 6px;
            padding: 32px 28px;
            width: min(320px, 90vw);
            display: flex; flex-direction: column; gap: 16px;
            text-align: center;
        }
        #login-title  { color: #a855f7; font-size: 18px; letter-spacing: 3px; }
        #login-sub    { color: #5b5280; font-size: 12px; }
        #login-pass   {
            width: 100%; background: #0d0d1c;
            border: 1px solid #2a1f4a; border-radius: 4px;
            color: #e2d9f3; font-family: 'Courier New', monospace;
            font-size: 14px; padding: 10px 12px; outline: none;
        }
        #login-pass:focus { border-color: #a855f7; }
        #login-btn {
            background: #7c3aed; color: white; border: none; border-radius: 4px;
            padding: 10px; font-family: 'Courier New', monospace;
            font-size: 13px; font-weight: bold; letter-spacing: 1px; cursor: pointer;
        }
        #login-btn:hover { background: #a855f7; }
        #login-err { color: #ef4444; font-size: 12px; min-height: 16px; }

        /* ── Image-mode control (topbar) ────────────────────────────────── */
        #img-mode { display: flex; align-items: center; gap: 4px; margin-left: 16px; }
        #img-mode-label { color: #5b5280; font-size: 10px; letter-spacing: 1px; }
        .img-mode-btn {
            background: #18182e; color: #5b5280;
            border: 1px solid #2a1f4a; border-radius: 3px;
            padding: 3px 8px; font-family: 'Courier New', monospace;
            font-size: 10px; letter-spacing: 1px; cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
        }
        .img-mode-btn:hover:not(:disabled):not(.active) { border-color: #7c3aed; color: #a78bfa; }
        .img-mode-btn.active   { background: #7c3aed; color: #fff; border-color: #a855f7; }
        .img-mode-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* ── Inline generated/gallery image ─────────────────────────────── */
        .chat-img {
            display: block; max-width: min(340px, 82%);
            margin: 6px 0 4px 2px;
            border: 1px solid #2a1f4a; border-radius: 6px;
        }
        .img-cap { color: #5b5280; font-size: 11px; font-style: italic; margin: 0 0 8px 4px; }

        /* ── Power / OFF button ─────────────────────────────────────────── */
        #power-off {
            background: #2a1010; color: #fca5a5;
            border: 1px solid #ef4444; border-radius: 3px;
            padding: 3px 10px; margin-left: 12px; flex-shrink: 0;
            font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; transition: background .15s, color .15s;
        }
        #power-off:hover { background: #ef4444; color: #fff; }

        /* ── Gallery view ───────────────────────────────────────────────── */
        #gallery-open {
            background: #18182e; color: #a78bfa; border: 1px solid #2a1f4a;
            border-radius: 4px; cursor: pointer; font-size: 13px; line-height: 1;
            padding: 4px 8px; margin-left: 8px; flex-shrink: 0;
            transition: background .15s, border-color .15s;
        }
        #gallery-open:hover { background: #2a1f4a; border-color: #7c3aed; }
        #gallery-overlay {
            position: fixed; inset: 0; z-index: 8000; background: #0a0a14;
            display: none; flex-direction: column;
        }
        #gallery-overlay.open { display: flex; }
        #gallery-bar {
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
            padding: 10px 14px; background: #13132c; border-bottom: 1px solid #2a1f4a;
        }
        #gallery-back {
            background: #7c3aed; color: #fff; border: none; border-radius: 6px;
            font: inherit; font-size: 15px; font-weight: bold; letter-spacing: 1px;
            padding: 10px 20px; cursor: pointer;
            transition: background .15s, box-shadow .15s;
            box-shadow: 0 0 0 1px #a855f7, 0 2px 10px rgba(124,58,237,.5);
        }
        #gallery-back:hover {
            background: #a855f7;
            box-shadow: 0 0 0 1px #c084fc, 0 2px 14px rgba(168,85,247,.7);
        }
        #gallery-title { color: #cbb8ff; letter-spacing: 2px; font-weight: bold; }
        #gallery-count { color: #5b5280; font-size: 12px; }
        #gallery-grid {
            flex: 1; overflow-y: auto; padding: 14px; align-content: start;
            display: grid; gap: 12px;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }
        .gallery-cell {
            border: 1px solid #2a1f4a; border-radius: 6px; overflow: hidden; background: #0d0d1c;
        }
        .gallery-cell img {
            display: block; width: 100%; height: 150px; object-fit: cover;
            cursor: zoom-in; background: #0d0d1c;
        }
        .gallery-cell .gcap {
            font-size: 10px; color: #5b5280; padding: 3px 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #gallery-msg { color: #5b5280; padding: 20px; font-style: italic; }
        #gallery-lightbox {
            position: fixed; inset: 0; z-index: 8100; background: rgba(5, 5, 12, .94);
            display: none; align-items: center; justify-content: center; cursor: zoom-out;
        }
        #gallery-lightbox.open { display: flex; }
        #gallery-lightbox img { max-width: 94vw; max-height: 94vh; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div id="login-box">
            <div id="login-title">PH3B3-LIGHT</div>
            <div id="login-sub">Enter access code</div>
            <input id="login-pass" type="password" placeholder="password…" autocomplete="current-password" />
            <button id="login-btn">CONNECT</button>
            <div id="login-err"></div>
        </div>
    </div>

    <div id="topbar">
        <span id="status-dot">●</span>
        <span id="status-text">Idle</span>
        <span id="img-mode" title="image generation mode">
            <span id="img-mode-label">IMG</span>
            <button class="img-mode-btn" data-mode="gallery">GALLERY</button>
            <button class="img-mode-btn" data-mode="live">LIVE</button>
            <button class="img-mode-btn" data-mode="auto">AUTO</button>
        </span>
        <button id="gallery-open" title="Browse the image gallery">🖼 GALLERY</button>
        <select id="server-select" title="Ph3b3 server" style="background:#1a1530;color:#cbb8ff;border:1px solid #3d3660;border-radius:4px;font:inherit;font-size:11px;padding:2px 4px;margin:0 4px;"></select>
        <button id="server-edit" title="Edit servers (Iris / Dio / Nyx / local)" style="background:none;border:none;color:#8b7fb8;cursor:pointer;font-size:13px;padding:0 4px;">⚙</button>
        <span id="title">PH3B3-LIGHT</span>
        <button id="power-off" title="Shut down Ph3b3 (stops the server)">⏻ OFF</button>
    </div>

    <div id="chat"></div>
    <div id="sep"></div>

    <div id="inputbar">
        <div id="left-col">
            <div id="input-wrap">
                <input id="msg-input" type="text" placeholder="type a message…" autocomplete="off" />
            </div>
            <div id="ctrl-row">
                <button id="send-btn">SEND</button>
                <div id="mode-box">
                    <button id="btn-auto">AUTO</button>
                    <button id="btn-hold">HOLD</button>
                </div>
            </div>
        </div>
        <div id="right-col">
            <canvas id="mic-canvas" width="120" height="120"></canvas>
            <div id="mic-label">hold to speak</div>
        </div>
    </div>

    <div id="gallery-overlay">
        <div id="gallery-bar">
            <button id="gallery-back" title="Return to chat">← BACK TO CHAT</button>
            <span id="gallery-title">GALLERY</span>
            <span id="gallery-count"></span>
        </div>
        <div id="gallery-grid"></div>
    </div>
    <div id="gallery-lightbox"><img id="gallery-lightbox-img" alt="" /></div>

    <script>
    // ── Servers (selectable Ph3b3 backends: Local / Iris / Dio / Nyx) ──────────
    // Each entry is a FULL Ph3b3 instance. This page is a thin client that talks
    // to whichever server is selected in the top-bar dropdown. base:'' means
    // same-origin (the server that served this page). Fill in Iris/Dio/Nyx with
    // their real hosts via the ⚙ button — the list is saved in this browser.
    // NOTE: for a remote server to answer this page, that server's .env must add
    // this page's origin to PH3B3_CORS_ORIGINS (else the browser blocks the call).
    const SERVERS_KEY = 'ph3b3_servers';
    const ACTIVE_KEY  = 'ph3b3_active_server';
    const DEFAULT_SERVERS = [
        { id: 'local',  label: 'Local (this machine)', base: '',                          user: '' },
        // Add remote Ph3b3 servers via the ⚙ editor (saved in the browser), e.g.:
        // { id: 'main', label: 'Ph3b3 (main)', base: 'http://<tailnet-ip>:7331', user: '' },
    ];
    function loadServers() {
        try {
            const raw = localStorage.getItem(SERVERS_KEY);
            if (raw) { const a = JSON.parse(raw); if (Array.isArray(a) && a.length) return a; }
        } catch {}
        return DEFAULT_SERVERS.slice();
    }
    function saveServers(list) { localStorage.setItem(SERVERS_KEY, JSON.stringify(list)); }
    let SERVERS = loadServers();
    let currentServerId = localStorage.getItem(ACTIVE_KEY) || SERVERS[0].id;
    function currentServer() { return SERVERS.find(s => s.id === currentServerId) || SERVERS[0]; }
    // Build a full API URL for the active server. Absolute URLs pass through
    // unchanged (e.g. image_url that a remote server returns as its own origin).
    function api(path) {
        if (/^https?:\/\//i.test(path)) return path;
        return (currentServer().base || '') + path;
    }

    // ── Auth (per-server Basic auth, mobile-safe) ─────────────────────────────
    let authHeader = '';
    function _credKey(id) { return 'ph3b3_creds_' + id; }
    function _loadStoredAuth() {
        const b64 = localStorage.getItem(_credKey(currentServerId));
        authHeader = b64 ? 'Basic ' + b64 : '';
    }
    function _storeAuth(password) {
        const b64 = btoa(currentServer().user + ':' + password);
        localStorage.setItem(_credKey(currentServerId), b64);
        authHeader = 'Basic ' + b64;
    }
    function _clearAuth() {
        localStorage.removeItem(_credKey(currentServerId));
        authHeader = '';
    }
    function _showLogin(msg) {
        document.getElementById('login-sub').textContent = 'Connect to ' + currentServer().label;
        document.getElementById('login-err').textContent = msg || '';
        document.getElementById('login-pass').value = '';
        document.getElementById('login-overlay').classList.add('visible');
        setTimeout(() => document.getElementById('login-pass').focus(), 50);
    }
    function _hideLogin() {
        document.getElementById('login-overlay').classList.remove('visible');
    }
    async function _tryLogin(password) {
        if (!password) return;
        _storeAuth(password);
        try {
            const r = await fetch(api('/health'), { headers: { 'Authorization': authHeader } });
            if (r.ok) { _hideLogin(); initApp(); return; }
        } catch {}
        _clearAuth();
        document.getElementById('login-err').textContent =
            'Wrong password (or server unreachable) — try again.';
        document.getElementById('login-pass').value = '';
        document.getElementById('login-pass').focus();
    }
    document.getElementById('login-pass').addEventListener('keydown', e => {
        if (e.key === 'Enter') _tryLogin(e.target.value);
    });
    document.getElementById('login-btn').addEventListener('click', () => {
        _tryLogin(document.getElementById('login-pass').value);
    });

    // ── Server switching / editor ─────────────────────────────────────────────
    function renderServerSelect() {
        const sel = document.getElementById('server-select');
        sel.innerHTML = '';
        for (const s of SERVERS) {
            const o = document.createElement('option');
            o.value = s.id; o.textContent = s.label;
            if (s.id === currentServerId) o.selected = true;
            sel.appendChild(o);
        }
    }
    function switchServer(id) {
        if (!SERVERS.find(s => s.id === id)) return;
        currentServerId = id;
        localStorage.setItem(ACTIVE_KEY, id);
        const s = currentServer();
        addSys('→ ' + s.label + (s.base ? '  (' + s.base + ')' : '  (local)'));
        _loadStoredAuth();
        if (!authHeader) { _showLogin(); return; }
        initApp();
    }
    function openServerEditor() {
        const text = SERVERS.map(s => [s.id, s.label, s.base, s.user].join(' | ')).join('\n');
        const next = prompt(
            'Edit Ph3b3 servers — one per line:\n' +
            '  id | label | base-url | user\n' +
            '(base-url empty = this machine; e.g.  iris | Iris | http://iris:7331 | astroson )',
            text);
        if (next == null) return;
        const list = [];
        for (const line of next.split('\n')) {
            const t = line.trim(); if (!t) continue;
            const [id, label, base, user] = t.split('|').map(x => (x || '').trim());
            if (!id) continue;
            list.push({ id, label: label || id, base: base || '', user: user || 'astroson' });
        }
        if (!list.length) return;
        SERVERS = list; saveServers(SERVERS);
        if (!SERVERS.find(s => s.id === currentServerId)) currentServerId = SERVERS[0].id;
        renderServerSelect();
        switchServer(currentServerId);
    }
    renderServerSelect();
    document.getElementById('server-select').addEventListener('change', e => switchServer(e.target.value));
    document.getElementById('server-edit').addEventListener('click', openServerEditor);

    _loadStoredAuth();
    if (!authHeader) _showLogin();

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const chatEl    = document.getElementById('chat');
    const inputEl   = document.getElementById('msg-input');
    const sendBtn   = document.getElementById('send-btn');
    const dotEl     = document.getElementById('status-dot');
    const statusEl  = document.getElementById('status-text');
    const btnAuto   = document.getElementById('btn-auto');
    const btnHold   = document.getElementById('btn-hold');
    const micCanvas = document.getElementById('mic-canvas');
    const micLabel  = document.getElementById('mic-label');
    const micCvx    = micCanvas.getContext('2d');

    // ── Status ───────────────────────────────────────────────────────────────
    const STATUS_COLORS = {
        Idle:      '#3d3660',
        Thinking:  '#f59e0b',
        Speaking:  '#38bdf8',
        Listening: '#22c55e',
    };

    function setStatus(s) {
        const c = STATUS_COLORS[s] || '#5b5280';
        dotEl.style.color    = c;
        statusEl.style.color = c;
        statusEl.textContent = s;
    }

    // ── Chat helpers ──────────────────────────────────────────────────────────
    let busy = false;

    function ts() {
        return new Date().toLocaleTimeString('en-GB', {
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    function addSys(text) {
        const el = document.createElement('div');
        el.className = 'msg-sys';
        el.textContent = `  ·  ${text}`;
        chatEl.appendChild(el);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addMsg(who, text) {
        const isUser = who === 'You';
        const header = document.createElement('div');
        header.style.marginTop = '10px';
        header.innerHTML =
            `<span class="msg-ts">${ts()}  </span>` +
            `<span class="msg-name-${isUser ? 'user' : 'bot'}">${who}</span>`;
        chatEl.appendChild(header);
        const body = document.createElement('div');
        body.className = `msg-text-${isUser ? 'user' : 'bot'}`;
        body.textContent = `  ${text}`;
        chatEl.appendChild(body);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addThinking() {
        const el = document.createElement('div');
        el.className = 'thinking';
        el.textContent = '  Ph3b3 is thinking…';
        chatEl.appendChild(el);
        chatEl.scrollTop = chatEl.scrollHeight;
        return el;
    }

    function lockInput() {
        sendBtn.disabled = true;
        inputEl.disabled = true;
    }

    function unlockInput() {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
    }

    // ── TTS audio playback ────────────────────────────────────────────────────
    let playCtx = null;

    function getPlayCtx() {
        if (!playCtx || playCtx.state === 'closed')
            playCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (playCtx.state === 'suspended') playCtx.resume();
        return playCtx;
    }

    async function playAudio(b64) {
        try {
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const ctx = getPlayCtx();
            const buffer = await ctx.decodeAudioData(bytes.buffer);
            return new Promise(resolve => {
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                src.connect(ctx.destination);
                src.onended = resolve;
                src.start();
            });
        } catch (e) {
            console.warn('Audio playback failed:', e);
        }
    }

    // ── Core chat fetch (caller manages busy + lock) ──────────────────────────
    async function doSend(text) {
        setStatus('Thinking');
        const thinking = addThinking();
        try {
            const res = await fetch(api('/chat'), {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': authHeader },
                body:    JSON.stringify({ message: text, session_id: 'web' }),
            });
            thinking.remove();
            if (res.status === 401) { _clearAuth(); _showLogin('Session expired — please reconnect.'); return; }
            if (!res.ok) {
                addSys(`Server error: ${res.status}`);
            } else {
                const data = await res.json();
                addMsg('Ph3b3', data.response || '(no response)');
                if (data.audio) {
                    setStatus('Speaking');
                    await playAudio(data.audio);
                }
            }
        } catch {
            thinking.remove();
            addSys('Cannot reach server — is Ph3b3 running?');
        }
        setStatus('Idle');
    }

    // ── Image request + inline render ─────────────────────────────────────────
    function addImage(objUrl, caption) {
        const header = document.createElement('div');
        header.style.marginTop = '10px';
        header.innerHTML =
            `<span class="msg-ts">${ts()}  </span>` +
            `<span class="msg-name-bot">Ph3b3</span>`;
        chatEl.appendChild(header);
        const img = document.createElement('img');
        img.className = 'chat-img';
        img.src = objUrl;
        img.alt = caption || 'generated image';
        chatEl.appendChild(img);
        if (caption) {
            const cap = document.createElement('div');
            cap.className = 'img-cap';
            cap.textContent = `  ${caption}`;
            chatEl.appendChild(cap);
        }
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendImage(prompt) {
        addMsg('You', `🖼  ${prompt}`);
        setStatus('Thinking');
        const thinking = addThinking();
        try {
            const res = await fetch(api('/image'), {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': authHeader },
                body:    JSON.stringify({ prompt }),
            });
            thinking.remove();
            if (res.status === 401) { _clearAuth(); _showLogin('Session expired — please reconnect.'); return; }
            if (!res.ok) { addSys(`Image error: ${res.status}`); return; }
            const data = await res.json();
            if (!data.ok) {                        // floor block / gate refusal / empty gallery → clean line
                addSys(data.reason || data.error || 'Image request could not be completed.');
                return;
            }
            // <img> can't send the auth header, so fetch the bytes with auth → blob URL.
            const imgRes = await fetch(api(data.image_url), { headers: { 'Authorization': authHeader } });
            if (!imgRes.ok) { addSys('Could not load image.'); return; }
            const objUrl = URL.createObjectURL(await imgRes.blob());
            let cap = data.source === 'live'
                ? `live · ${data.gen_seconds != null ? data.gen_seconds + 's' : 'ok'}`
                : 'gallery';
            if (data.fell_back) cap += ' (live unavailable — fallback)';
            addImage(objUrl, cap);
        } catch {
            thinking.remove();
            addSys('Cannot reach server — is Ph3b3 running?');
        } finally {
            setStatus('Idle');
        }
    }

    // ── Text box send ─────────────────────────────────────────────────────────
    async function send() {
        const raw = inputEl.value.trim();
        if (!raw || busy) return;
        inputEl.value = '';
        busy = true;
        lockInput();
        const m = raw.match(/^\/(?:img|image)\s+([\s\S]+)/i);
        if (m) {
            await sendImage(m[1].trim());
        } else {
            addMsg('You', raw);
            await doSend(raw);
        }
        busy = false;
        unlockInput();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    // ── WAV encoding (Float32 PCM → 16-bit WAV) ───────────────────────────────
    function encodeWAV(chunks, sampleRate) {
        let total = chunks.reduce((n, c) => n + c.length, 0);
        const flat = new Float32Array(total);
        let off = 0;
        for (const c of chunks) { flat.set(c, off); off += c.length; }

        const pcm = new Int16Array(flat.length);
        for (let i = 0; i < flat.length; i++)
            pcm[i] = Math.max(-32768, Math.min(32767, flat[i] * 32768));

        const buf = new ArrayBuffer(44 + pcm.byteLength);
        const v   = new DataView(buf);
        const ws  = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
        ws(0, 'RIFF');  v.setUint32(4, 36 + pcm.byteLength, true);
        ws(8, 'WAVE');  ws(12, 'fmt ');
        v.setUint32(16, 16, true);        // fmt chunk size
        v.setUint16(20,  1, true);        // PCM
        v.setUint16(22,  1, true);        // mono
        v.setUint32(24, sampleRate, true);
        v.setUint32(28, sampleRate * 2, true);  // byte rate
        v.setUint16(32,  2, true);        // block align
        v.setUint16(34, 16, true);        // bits per sample
        ws(36, 'data'); v.setUint32(40, pcm.byteLength, true);
        new Uint8Array(buf, 44).set(new Uint8Array(pcm.buffer));
        return buf;
    }

    function chunksToB64(chunks, sr) {
        const wav = encodeWAV(chunks, sr);
        const b = new Uint8Array(wav);
        let s = '';
        for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
        return btoa(s);
    }

    // ── Transcribe → chat ─────────────────────────────────────────────────────
    async function transcribeAndChat(chunks, sr) {
        const b64 = chunksToB64(chunks, sr);
        let text = '';
        try {
            const tr = await fetch(api('/transcribe'), {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': authHeader },
                body:    JSON.stringify({ audio: b64 }),
            });
            const td = await tr.json();
            text = (td.text || '').trim();
        } catch (e) {
            addSys(`Transcription error: ${e.message}`);
            return false;
        }
        if (!text) { addSys('(no speech detected)'); return false; }

        addMsg('You', text);
        busy = true;
        lockInput();
        try {
            await doSend(text);
        } finally {
            busy = false;
            unlockInput();
        }
        return true;
    }

    // ── Mic canvas ────────────────────────────────────────────────────────────
    const CX = 60, CY = 60, CR = 54;

    function drawMic(fill, ring, emoji) {
        micCvx.clearRect(0, 0, 120, 120);
        micCvx.beginPath();
        micCvx.arc(CX, CY, CR + 4, 0, 2 * Math.PI);
        micCvx.strokeStyle = ring;
        micCvx.lineWidth = 3;
        micCvx.stroke();
        micCvx.beginPath();
        micCvx.arc(CX, CY, CR, 0, 2 * Math.PI);
        micCvx.fillStyle = fill;
        micCvx.fill();
        micCvx.font = '30px monospace';
        micCvx.textAlign = 'center';
        micCvx.textBaseline = 'middle';
        micCvx.fillStyle = emoji;
        micCvx.fillText('🎤', CX, CY);
    }

    // ── Mic availability ─────────────────────────────────────────────────────
    const MIC_OK = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

    // ── Mic state ─────────────────────────────────────────────────────────────
    let micMode       = 'hold';   // 'hold' | 'auto'
    let autoOn        = false;
    let holdRecording = false;
    let autoCapturing = false;

    // Web Audio objects (recreated each session)
    let micStream    = null;
    let micCtx       = null;
    let micSource    = null;
    let micProc      = null;
    let micAnalyser  = null;
    let micSR        = 44100;  // filled from micCtx.sampleRate

    // Sample buffers
    let holdChunks     = [];
    let capturedChunks = [];
    let preRollChunks  = [];
    const PRE_ROLL_MAX = 6;  // ~6 × 256ms ≈ 1.5 s ring buffer

    // VAD
    let vadState    = 'waiting'; // 'waiting' | 'capturing' | 'submitting'
    let vadThresh   = 0.018;
    let silenceN    = 0;
    let captureT    = 0;
    let autoItvl    = null;

    const VAD_SILENCE_MS  = 1400;
    const VAD_MIN_SECS    = 0.4;
    const VAD_TICK_MS     = 80;
    const VAD_SILENCE_TKS = Math.ceil(VAD_SILENCE_MS / VAD_TICK_MS);  // 18 ticks

    // ── Mode buttons ──────────────────────────────────────────────────────────
    function refreshButtons() {
        if (micMode === 'auto') {
            btnAuto.style.background = autoOn ? '#22c55e' : '#15803d';
            btnAuto.style.color      = autoOn ? 'black'   : 'white';
            btnHold.style.background = '#18182e';
            btnHold.style.color      = '#5b5280';
        } else {
            btnAuto.style.background = '#18182e';
            btnAuto.style.color      = '#5b5280';
            btnHold.style.background = '#7c3aed';
            btnHold.style.color      = 'white';
        }
    }

    // ── Pulse animation ───────────────────────────────────────────────────────
    let pulseN = 0;
    setInterval(() => {
        pulseN = (pulseN + 1) % 20;
        const hi = pulseN < 10;
        if (holdRecording) {
            drawMic(hi ? '#4c1d95' : '#1e1730', hi ? '#a855f7' : '#4a3880', hi ? 'white' : '#5b5280');
        } else if (autoCapturing) {
            drawMic(hi ? '#14532d' : '#071510', hi ? '#22c55e' : '#166534', hi ? '#86efac' : '#5b5280');
        } else if (autoOn) {
            drawMic('#071510', hi ? '#166534' : '#0d2b1a', '#5b5280');
        } else if (hi) {
            drawMic('#1e1730', '#4a3880', '#5b5280');
        }
    }, 130);

    // ── Mic teardown helper ───────────────────────────────────────────────────
    function teardownMic() {
        if (autoItvl)   { clearInterval(autoItvl); autoItvl = null; }
        if (micProc)    { micProc.disconnect();    micProc  = null; }
        if (micAnalyser){ micAnalyser.disconnect();micAnalyser = null; }
        if (micSource)  { micSource.disconnect();  micSource = null; }
        if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        if (micCtx)     { micCtx.close();          micCtx   = null; }
    }

    // ── HOLD mode ─────────────────────────────────────────────────────────────
    async function startHold() {
        if (!MIC_OK || holdRecording || busy) return;
        holdRecording = true;
        holdChunks = [];
        try {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
            });
            micCtx   = new AudioContext();
            micSR    = micCtx.sampleRate;
            micSource = micCtx.createMediaStreamSource(micStream);
            micProc   = micCtx.createScriptProcessor(4096, 1, 1);
            micProc.onaudioprocess = e => {
                if (holdRecording)
                    holdChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            };
            micSource.connect(micProc);
            micProc.connect(micCtx.destination);
        } catch (e) {
            addSys(`Mic error: ${e.message}`);
            holdRecording = false;
            teardownMic();
            return;
        }
        setStatus('Listening');
        micLabel.textContent = 'recording…';
    }

    async function stopHold() {
        if (!holdRecording) return;
        holdRecording = false;
        const chunks = holdChunks.splice(0);
        const sr = micSR;
        teardownMic();

        if (!chunks.length) {
            setStatus('Idle');
            micLabel.textContent = 'hold to speak';
            return;
        }
        micLabel.textContent = 'transcribing…';
        await transcribeAndChat(chunks, sr);
        setStatus('Idle');
        micLabel.textContent = 'hold to speak';
    }

    // ── AUTO mode ─────────────────────────────────────────────────────────────
    async function startAutoLoop() {
        if (!MIC_OK || autoOn) return;
        autoOn = true;
        vadState       = 'waiting';
        capturedChunks = [];
        preRollChunks  = [];
        silenceN       = 0;
        refreshButtons();
        micLabel.textContent = 'calibrating…';
        setStatus('Listening');

        try {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
            });
            micCtx    = new AudioContext();
            micSR     = micCtx.sampleRate;
            micSource = micCtx.createMediaStreamSource(micStream);

            // Analyser for RMS-based VAD
            micAnalyser         = micCtx.createAnalyser();
            micAnalyser.fftSize = 1024;
            const vadBuf        = new Float32Array(micAnalyser.fftSize);

            // ScriptProcessor collects PCM into the right bucket
            micProc = micCtx.createScriptProcessor(4096, 1, 1);
            micProc.onaudioprocess = e => {
                const chunk = new Float32Array(e.inputBuffer.getChannelData(0));
                if (vadState === 'waiting') {
                    if (preRollChunks.length >= PRE_ROLL_MAX) preRollChunks.shift();
                    preRollChunks.push(chunk);
                } else if (vadState === 'capturing') {
                    capturedChunks.push(chunk);
                }
                // 'submitting': discard
            };

            micSource.connect(micAnalyser);
            micSource.connect(micProc);
            micProc.connect(micCtx.destination);

            // Calibrate noise floor over ~700 ms
            const noiseSamples = [];
            await new Promise(resolve => {
                const calId = setInterval(() => {
                    micAnalyser.getFloatTimeDomainData(vadBuf);
                    let sum = 0; for (const s of vadBuf) sum += s * s;
                    noiseSamples.push(Math.sqrt(sum / vadBuf.length));
                    if (noiseSamples.length >= 9) { clearInterval(calId); resolve(); }
                }, VAD_TICK_MS);
            });
            const noise = noiseSamples.reduce((a, b) => a + b, 0) / noiseSamples.length;
            vadThresh = Math.max(0.018, noise * 3.5);
            addSys(`Auto · noise ${noise.toFixed(4)} · threshold ${vadThresh.toFixed(4)}`);
            micLabel.textContent = 'listening…';

            // VAD tick loop
            autoItvl = setInterval(() => {
                if (!autoOn) { clearInterval(autoItvl); autoItvl = null; return; }
                if (busy || vadState === 'submitting') return;

                micAnalyser.getFloatTimeDomainData(vadBuf);
                let sum = 0; for (const s of vadBuf) sum += s * s;
                const rms = Math.sqrt(sum / vadBuf.length);

                if (vadState === 'waiting') {
                    if (rms >= vadThresh) {
                        capturedChunks = preRollChunks.splice(0);
                        silenceN   = 0;
                        captureT   = Date.now();
                        vadState   = 'capturing';
                        autoCapturing = true;
                    }
                } else if (vadState === 'capturing') {
                    if (rms < vadThresh) {
                        silenceN++;
                        if (silenceN >= VAD_SILENCE_TKS) {
                            // End of utterance
                            vadState      = 'submitting';
                            autoCapturing = false;
                            const chunks  = capturedChunks.splice(0);
                            preRollChunks = [];
                            silenceN      = 0;
                            const secs    = (Date.now() - captureT) / 1000;

                            if (secs < VAD_MIN_SECS) {
                                vadState = 'waiting';
                                return;
                            }

                            micLabel.textContent = 'transcribing…';
                            const sr = micSR;
                            transcribeAndChat(chunks, sr).then(() => {
                                if (autoOn) {
                                    vadState = 'waiting';
                                    setStatus('Listening');
                                    micLabel.textContent = 'listening…';
                                }
                            });
                        }
                    } else {
                        silenceN = 0;
                    }
                }
            }, VAD_TICK_MS);

        } catch (e) {
            addSys(`Mic error: ${e.message}`);
            stopAutoLoop();
        }
    }

    function stopAutoLoop() {
        autoOn        = false;
        autoCapturing = false;
        vadState      = 'waiting';
        teardownMic();
        refreshButtons();
        micLabel.textContent = 'tap to start';
        setStatus('Idle');
    }

    // ── Mode switching ────────────────────────────────────────────────────────
    function setMicMode(mode) {
        if (mode === micMode) {
            // Re-clicking same mode toggles auto loop
            if (mode === 'auto') { autoOn ? stopAutoLoop() : startAutoLoop(); }
            return;
        }
        if (micMode === 'auto' && autoOn) stopAutoLoop();
        micMode = mode;
        refreshButtons();
        micLabel.textContent = mode === 'hold' ? 'hold to speak' : 'tap to start';
    }

    btnAuto.addEventListener('click', () => setMicMode('auto'));
    btnHold.addEventListener('click', () => setMicMode('hold'));

    // ── Mic canvas events ─────────────────────────────────────────────────────
    micCanvas.addEventListener('mousedown', () => {
        if (micMode === 'hold') startHold();
        else autoOn ? stopAutoLoop() : startAutoLoop();
    });
    micCanvas.addEventListener('mouseup',    () => { if (micMode === 'hold') stopHold(); });
    micCanvas.addEventListener('mouseleave', () => { if (micMode === 'hold' && holdRecording) stopHold(); });

    // Ensure mouseup outside canvas still stops HOLD recording
    document.addEventListener('mouseup', () => { if (micMode === 'hold' && holdRecording) stopHold(); });

    micCanvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (micMode === 'hold') startHold();
        else autoOn ? stopAutoLoop() : startAutoLoop();
    }, { passive: false });
    micCanvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (micMode === 'hold') stopHold();
    }, { passive: false });

    // ── Init ──────────────────────────────────────────────────────────────────
    refreshButtons();

    if (!MIC_OK) {
        // Draw mic disabled (red-tinted, locked cursor)
        drawMic('#1a0a0a', '#4a1010', '#5b5280');
        micCanvas.style.cursor = 'not-allowed';
        micLabel.textContent   = 'mic unavailable';
        btnAuto.disabled = true; btnAuto.style.opacity = '0.35'; btnAuto.style.cursor = 'not-allowed';
        btnHold.disabled = true; btnHold.style.opacity = '0.35'; btnHold.style.cursor = 'not-allowed';
    } else {
        drawMic('#1e1730', '#4a3880', '#5b5280');
    }

    // ── Image-mode control ────────────────────────────────────────────────────
    const imgBtns = Array.from(document.querySelectorAll('.img-mode-btn'));

    function paintImgMode(mode, liveEnabled) {
        imgBtns.forEach(b => {
            const m = b.dataset.mode;
            b.classList.toggle('active', m === mode);
            const gated = (m === 'live' || m === 'auto') && !liveEnabled;
            b.disabled = gated;
            b.title    = gated ? 'not enabled on this build' : '';
        });
    }

    async function initImageMode() {
        try {
            const r = await fetch(api('/image/config'), { headers: { 'Authorization': authHeader } });
            if (!r.ok) return;
            const d = await r.json();
            paintImgMode(d.mode, d.live_enabled);
        } catch {}
    }

    imgBtns.forEach(b => b.addEventListener('click', async () => {
        if (b.disabled) return;
        try {
            const r = await fetch(api('/image/mode'), {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': authHeader },
                body:    JSON.stringify({ mode: b.dataset.mode }),
            });
            if (!r.ok) { addSys('Could not switch image mode'); return; }
            const d = await r.json();
            paintImgMode(d.mode, d.live_enabled);
            addSys(`Image mode → ${d.mode}`);
        } catch { addSys('Could not switch image mode'); }
    }));

    // ── Gallery view ──────────────────────────────────────────────────────────
    const galleryOverlay     = document.getElementById('gallery-overlay');
    const galleryGrid        = document.getElementById('gallery-grid');
    const galleryCount       = document.getElementById('gallery-count');
    const galleryLightbox    = document.getElementById('gallery-lightbox');
    const galleryLightboxImg = document.getElementById('gallery-lightbox-img');
    let galleryUrls = [];   // active blob URLs; revoked on close to free memory

    function closeGallery() {
        galleryOverlay.classList.remove('open');
        galleryLightbox.classList.remove('open');
        galleryUrls.forEach(u => URL.revokeObjectURL(u));
        galleryUrls = [];
        galleryGrid.innerHTML = '';
    }

    async function openGallery() {
        galleryOverlay.classList.add('open');
        galleryGrid.innerHTML = '<div id="gallery-msg">Loading gallery…</div>';
        galleryCount.textContent = '';
        let names;
        try {
            const r = await fetch(api('/image/gallery'), { headers: { 'Authorization': authHeader } });
            if (r.status === 401) { closeGallery(); _clearAuth(); _showLogin('Session expired — please reconnect.'); return; }
            if (!r.ok) { galleryGrid.innerHTML = '<div id="gallery-msg">Could not load gallery.</div>'; return; }
            names = (await r.json()).images || [];
        } catch { galleryGrid.innerHTML = '<div id="gallery-msg">Cannot reach server — is Ph3b3 running?</div>'; return; }

        if (!names.length) {
            galleryGrid.innerHTML = '<div id="gallery-msg">No images yet — generate one with /img &lt;prompt&gt;.</div>';
            return;
        }
        galleryGrid.innerHTML = '';
        galleryCount.textContent = `${names.length} image${names.length === 1 ? '' : 's'}`;
        // <img> can't send the auth header, so fetch each with auth → blob URL.
        for (const name of names) {
            try {
                const ir = await fetch(api('/image/file/' + encodeURIComponent(name)), { headers: { 'Authorization': authHeader } });
                if (!ir.ok) continue;
                const url = URL.createObjectURL(await ir.blob());
                galleryUrls.push(url);
                const cell = document.createElement('div');
                cell.className = 'gallery-cell';
                const im = document.createElement('img');
                im.src = url; im.alt = name; im.loading = 'lazy';
                im.addEventListener('click', () => { galleryLightboxImg.src = url; galleryLightbox.classList.add('open'); });
                const cap = document.createElement('div');
                cap.className = 'gcap'; cap.textContent = name;
                cell.appendChild(im); cell.appendChild(cap);
                galleryGrid.appendChild(cell);
            } catch {}
        }
    }

    document.getElementById('gallery-open').addEventListener('click', openGallery);
    document.getElementById('gallery-back').addEventListener('click', closeGallery);
    galleryLightbox.addEventListener('click', () => galleryLightbox.classList.remove('open'));
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (galleryLightbox.classList.contains('open'))      galleryLightbox.classList.remove('open');
        else if (galleryOverlay.classList.contains('open'))  closeGallery();
    });

    // ── Power / OFF button ────────────────────────────────────────────────────
    document.getElementById('power-off').addEventListener('click', async () => {
        if (!confirm('Shut down Ph3b3? The server will stop and must be restarted from the desktop shortcut.')) return;
        try {
            const r = await fetch(api('/power/off'), { method: 'POST', headers: { 'Authorization': authHeader } });
            if (r.status === 401) { _clearAuth(); _showLogin('Session expired — please reconnect.'); return; }
            addSys('Ph3b3 is shutting down…  (restart with the desktop shortcut)');
            setStatus('Idle');
            lockInput();
        } catch { addSys('Shutdown request failed.'); }
    });

    async function initApp() {
        try {
            const res = await fetch(api('/health'), { headers: { 'Authorization': authHeader } });
            if (res.status === 401) { _clearAuth(); _showLogin('Access denied.'); return; }
            const d = await res.json();
            document.title = `Ph3b3-Light · ${currentServer().label} — Boot #${d.boot}`;
            addSys(`Connected · Boot #${d.boot} · ${d.model}`);
            initImageMode();
            addSys('Type  /img <prompt>  to generate an image.');
        } catch {
            addSys('Server offline — launch Ph3b3 first');
        }
        if (!MIC_OK) {
            addSys('Microphone requires HTTPS or a browser exception for this origin.');
            addSys('Firefox: open about:config → set  media.devices.insecure.enabled = true  → reload');
            addSys('Chrome:  open chrome://flags/#unsafely-treat-insecure-origin-as-secure → add this page\'s URL → relaunch');
        }
        inputEl.focus();
    }

    if (authHeader) initApp();
    </script>
</body>
